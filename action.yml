name: 'AI Code Reviewer'
description: 'Agente inteligente de Code Review utilizando IA com diretrizes customizáveis.'
author: 'Gilson'

inputs:
  github_token:
    description: 'Github Token (geralmente passsado com secrets.GITHUB_TOKEN)'
    required: true
  ai_api_key:
    description: 'Chave de API do provedor (OpenAI, Anthropic, Gemini, Ollama, etc)'
    required: true
  ai_base_url:
    description: 'URL base da API (Opcional). Útil para provedores como Ollama interno, vLLM, ou compatíveis.'
    required: false
  ai_model:
    description: "The AI model to use (default: gpt-4o-mini)"
    required: false
    default: "gpt-4o-mini"
  enable_jira:
    description: "Enable JIRA ticket creation for blocking issues (true/false)"
    required: false
    default: "false"
  jira_host:
    description: "JIRA host (e.g., your-domain.atlassian.net)"
    required: false
  jira_email:
    description: "Email for JIRA authentication"
    required: false
  jira_token:
    description: "API Token for JIRA authentication"
    required: false
  jira_project:
    description: "JIRA Project Key"
    required: false
  custom_rules:
    description: 'Regras de negócio ou Code Style em texto puro injetadas diretamente do Workflow YAML.'
    required: false
  rules_path:
    description: 'Caminho customizado do arquivo Markdown que contém as regras. (Ex: .github/ai-rules.md)'
    required: false

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'purple'
