name: 'AI Code Reviewer'
description: 'Agente inteligente de Code Review utilizando Gemini 3.1 com diretrizes customizáveis.'
author: 'Alicon / Gilson'

inputs:
  github_token:
    description: 'Github Token (geralmente passsado com secrets.GITHUB_TOKEN)'
    required: true
  gemini_api_key:
    description: 'Chave de API do Google Gemini AI'
    required: true

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'check-circle'
  color: 'purple'
